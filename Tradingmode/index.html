<!DOCTYPE html>
<html lang="ko">
<head>

<body>
<div id="root"></div>
<!-- ─── Backend config (override at deploy time) ───────────────────────── -->
<script>
  window.API_BASE_URL = 'http://localhost:8000';
</script>
<!-- ─── React + Babel CDNs ─────────────────────────────────────────────── -->

<!-- ─── Backend → frontend instrument adapter ──────────────────────────── -->
<script src="loader.js?v=7"></script>
<!-- ─── React components ───────────────────────────────────────────────── -->
<script type="text/babel" src="tweaks-panel.jsx?v=7"></script>
<script type="text/babel" src="charts.jsx?v=7"></script>
